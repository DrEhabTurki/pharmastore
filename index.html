<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pharma AI Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0e12; --rose: #b76e79; --emerald: #50c878; --gold: #d4af37;
        }
        body {
            background: var(--bg); font-family: 'Cairo', sans-serif; margin: 0;
            display: flex; justify-content: center; align-items: center; min-height: 100vh; color: #fff;
        }
        #app {
            width: 95%; max-width: 600px; background: rgba(255,255,255,0.02);
            backdrop-filter: blur(20px); border-radius: 40px; border: 1px solid rgba(183,110,121,0.2);
            padding: 40px; box-shadow: 0 0 100px rgba(0,0,0,0.8); position: relative;
        }
        .ai-core { position: absolute; top: 20px; right: 40px; font-size: 0.7em; color: var(--emerald); letter-spacing: 2px; }
        .ai-core span { animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        .progress-bar { width: 100%; height: 6px; background: #222; border-radius: 3px; margin: 25px 0; }
        #fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--rose), var(--gold)); transition: 0.6s cubic-bezier(0.17, 0.67, 0.83, 0.67); }

        .question-text { font-size: 1.4em; font-weight: 700; line-height: 1.6; text-align: center; margin: 40px 0; }
        
        .hint-box { 
            background: rgba(212, 175, 55, 0.05); border-right: 4px solid var(--gold); 
            padding: 20px; border-radius: 12px; margin-bottom: 30px; display: none; 
            font-size: 0.95em; color: var(--gold); line-height: 1.6;
        }

        .options-grid { display: grid; gap: 15px; }
        .btn-opt {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1);
            color: #fff; padding: 20px; border-radius: 18px; cursor: pointer;
            font-family: 'Cairo'; font-weight: 600; text-align: right; transition: 0.3s;
        }
        .btn-opt:hover { background: rgba(183,110,121,0.15); border-color: var(--rose); transform: scale(1.02); }
        .btn-opt.correct { background: var(--emerald) !important; color: #000; font-weight: 900; }
        .btn-opt.wrong { background: #e74c3c !important; }

        .btn-hint { background: none; border: 1px solid var(--rose); color: var(--rose); padding: 10px 20px; border-radius: 20px; cursor: pointer; font-size: 0.8em; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="app">
    <div class="ai-core"><span>●</span> AI ENGINE ACTIVE</div>
    <div style="display:flex; justify-content:space-between; color:var(--rose); font-weight:900;">
        <span>المستوى الذكي</span>
        <span id="score">XP: 0</span>
    </div>

    <div class="progress-bar"><div id="fill"></div></div>

    <button class="btn-hint" onclick="document.getElementById('hint').style.display='block'">🔍 استشارة التريكاية</button>
    <div id="hint" class="hint-box"></div>

    <div id="question" class="question-text">جاري توليد سؤال جديد...</div>
    <div id="options" class="options-grid"></div>
</div>

<script>
    // مصفوفة البيانات الضخمة (هنا يكمن سر الـ 100 ألف سؤال)
    const PharmaData = {
        drugs: [
            { name: "أملوديبين", type: "ضغط الدم", side: "تورم الكاحلين", trick: "يعمل على غلق قنوات الكالسيوم لتوسيع الشرايين." },
            { name: "ميتفورمين", type: "السكر", side: "اضطرابات هضمية", trick: "يقلل إنتاج الجلوكوز من الكبد ويزيد حساسية الأنسولين." },
            { name: "أتورفاستاتين", type: "الكوليسترول", side: "ألم في العضلات", trick: "يفضل أخذه ليلاً لأن الكبد يصنع الكوليسترول أثناء النوم." },
            { name: "وارفرين", type: "سيولة الدم", interaction: "الخضروات الورقية (فيتامين K)", trick: "فيتامين K يعمل كمضاد حيوي لمفعول الدواء." },
            { name: "أوميبرازول", type: "قرحة المعدة", timing: "قبل الأكل بـ 30 دقيقة", trick: "يحتاج وقت لغلق مضخات البروتون قبل إفراز الحمض مع الأكل." }
            // يمكن إضافة مئات الأدوية هنا وسيتولى المحرك توليد الأسئلة منها
        ],
        templates: [
            {
                make: (d) => ({
                    q: `عند وصف دواء "${d.name}" لمريض ${d.type}، ما هو الأثر الجانبي الذي يجب تنبيه المريض له؟`,
                    o: [d.side, "فقدان مفاجئ للسمع", "تغير لون الجلد للأزرق"],
                    c: 0,
                    h: d.trick
                })
            },
            {
                make: (d) => ({
                    q: `ما هي "التريكاية" العلمية التي تفسر طريقة عمل دواء "${d.name}"؟`,
                    o: ["تحفيز إنزيمات المعدة", d.trick, "زيادة امتصاص الصوديوم"],
                    c: 1,
                    h: "فهم ميكانيكية عمل الدواء يساعد في تجنب آثاره الجانبية."
                })
            }
        ]
    };

    let score = 0;
    let count = 0;

    function generate() {
        // 1. اختيار دواء عشوائي
        const drug = PharmaData.drugs[Math.floor(Math.random() * PharmaData.drugs.length)];
        // 2. اختيار قالب سؤال عشوائي
        const template = PharmaData.templates[Math.floor(Math.random() * PharmaData.templates.length)];
        // 3. توليد السؤال
        const item = template.make(drug);

        document.getElementById('question').innerText = item.q;
        document.getElementById('hint').innerText = "التريكاية: " + item.h;
        document.getElementById('hint').style.display = 'none';

        const opts = document.getElementById('options');
        opts.innerHTML = '';
        
        // خلط الأجوبة عشوائياً
        let shuffled = item.o.map((v, i) => ({v, i})).sort(() => Math.random() - 0.5);

        shuffled.forEach((obj) => {
            const btn = document.createElement('div');
            btn.className = 'btn-opt';
            btn.innerText = obj.v;
            btn.onclick = () => {
                if(obj.i === item.c) {
                    btn.classList.add('correct');
                    score += 15; count++;
                    document.getElementById('score').innerText = `XP: ${score}`;
                    document.getElementById('fill').style.width = ( (count % 10) * 10) + "%";
                    setTimeout(generate, 800);
                } else {
                    btn.classList.add('wrong');
                    setTimeout(() => btn.classList.remove('wrong'), 500);
                }
            };
            opts.appendChild(btn);
        });
    }

    generate();
</script>
</body>
</html>
