<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>منصة الصيدليات</title>
</head>
<body class="bg-gray-50 font-sans">

    <!-- Header -->
    <header class="bg-blue-600 p-4 text-white shadow-lg">
        <div class="flex justify-between items-center mb-4">
            <h1 class="text-xl font-bold">صيدليتي أونلاين</h1>
            <div class="bg-blue-500 p-2 rounded-full">📍 شبرا الخيمة</div>
        </div>
        
        <!-- Search Bar -->
        <input type="text" placeholder="ابحث عن دواء أو منتج..." 
               class="w-full p-3 rounded-lg text-gray-800 outline-none shadow-md">
    </header>

    <!-- Main Content -->
    <main class="p-4">
        
        <!-- Quick Actions -->
        <div class="grid grid-cols-2 gap-4 mb-6">
            <button class="bg-white p-4 rounded-xl shadow border border-blue-100 flex flex-col items-center">
                <span>📷</span> <span>صوّر الروشتة</span>
            </button>
            <button class="bg-white p-4 rounded-xl shadow border border-blue-100 flex flex-col items-center">
                <span>💬</span> <span>صيدلي متاح</span>
            </button>
        </div>

        <!-- Section Title -->
        <h2 class="text-lg font-bold mb-3">أقرب الصيدليات لك</h2>

        <!-- Pharmacy Card -->
        <div class="bg-white p-4 rounded-xl shadow-md mb-4 flex items-center">
            <div class="w-16 h-16 bg-blue-100 rounded-lg flex items-center justify-center font-bold">ص</div>
            <div class="mr-4">
                <h3 class="font-bold">صيدلية د. مراد</h3>
                <p class="text-sm text-gray-500">توصيل خلال 20 دقيقة</p>
                <div class="text-yellow-500 text-sm">★★★★★</div>
            </div>
            <button class="mr-auto bg-blue-600 text-white px-4 py-2 rounded-lg">فتح</button>
        </div>

    </main>

</body>
</html>
