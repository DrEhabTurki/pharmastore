<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pharma Master 100K</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #1a1b1e; --rose: #b76e79; --emerald: #50c878; --white: #f8f9fa; }
        body { background: var(--bg); font-family: 'Cairo', sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: var(--white); }
        #app { width: 90%; max-width: 500px; background: #2d2e32; padding: 25px; border-radius: 25px; border: 2px solid var(--rose); box-shadow: 0 15px 40px rgba(0,0,0,0.4); }
        .stats { display: flex; justify-content: space-between; font-weight: 900; color: var(--rose); font-size: 0.9em; margin-bottom: 15px; }
        .q-card { background: #36393f; padding: 20px; border-radius: 15px; margin-bottom: 20px; min-height: 100px; font-size: 1.2em; text-align: center; border: 1px solid rgba(183,110,121,0.2); }
        .opt-grid { display: grid; gap: 12px; }
        .btn-opt { background: var(--emerald); border: none; color: #fff; padding: 15px; border-radius: 12px; cursor: pointer; font-family: 'Cairo'; font-weight: 700; transition: 0.2s; font-size: 1em; }
        .btn-opt:hover { transform: translateY(-3px); filter: brightness(1.1); }
        .progress { width: 100%; height: 5px; background: #111; border-radius: 10px; margin-bottom: 20px; }
        #fill { height: 100%; background: var(--rose); width: 0%; transition: 0.3s; }
    </style>
</head>
<body>

<div id="app">
    <div class="stats">
        <span id="q-count">السؤال: 1</span>
        <span id="xp">XP: 0</span>
    </div>
    <div class="progress"><div id="fill"></div></div>
    <div id="question" class="q-card">جاري تحضير السؤال...</div>
    <div id="options" class="opt-grid"></div>
</div>

<script>
    // بنك الأسئلة - يمكنك إضافة آلاف الأسطر هنا بنفس التنسيق
    const masterBank = [
        { q: "مريض السكر لو حس برعشة وعرق بارد، التصرف الأسرع هو:", o: ["ياخد حقنة أنسولين", "يشرب مية بسكر فوراً", "ينام ويرفع رجله"], c: 1 },
        { q: "ليه أدوية السيولة (زي ماريفان) لازم تتابع بتحليل INR؟", o: ["عشان نتأكد إنها بتنيم", "عشان نمنع حدوث نزيف مفاجئ", "عشان بتعمل صداع"], c: 1 },
        { q: "أفضل وقت لأخذ مدرات البول (أدوية الضغط) هو:", o: ["قبل النوم مباشرة", "في الصباح الباكر", "وسط الغداء"], c: 1 },
        { q: "المسكن الآمن لمريض يعاني من قرحة المعدة هو:", o: ["كتفلام", "باي بروفينيد", "باراسيتامول"], c: 2 },
        { q: "وضع 'النيتروجلسرين' تحت اللسان في الأزمات القلبية هدفه:", o: ["تسكين ألم الصدر", "توسيع شرايين القلب بسرعة", "خفض السكر"], c: 1 },
        { q: "ليه ممنوع مريض الضغط يوقف الدواء فجأة من نفسه؟", o: ["عشان الدواء غالي", "ممكن يعمل ارتفاع مفاجئ وخطير", "عشان طعمه وحش"], c: 1 },
        { q: "أدوية 'الحديد' يفضل شربها مع عصير برتقال لأنها:", o: ["بتغير طعم البرتقال", "فيتامين C بيزود امتصاصها", "بتمنع الحموضة"], c: 1 },
        { q: "استخدام بخاخات الكورتيزون للصدر يتطلب بعدها:", o: ["المضمضة بالماء جيداً", "النوم مباشرة", "شرب لبن دافئ"], c: 0 },
        { q: "مريض 'النقرس' يفضل أن يقلل من تناول:", o: ["الألبان", "اللحوم الحمراء والبقوليات", "الفاكهة"], c: 1 },
        { q: "جرعة 'الأسبرين' الوقائية (75-100 مجم) تؤخذ غالباً:", o: ["بعد الغداء لتقليل أثرها على المعدة", "على الريق", "قبل الفطار بساعة"], c: 0 },
        { q: "قطرات العين 'المفتوحة' صلاحيتها غالباً تكون:", o: ["حتى تاريخ الانتهاء", "أسبوعين إلى شهر من الفتح", "سنة كاملة"], c: 1 },
        { q: "عند حدوث حرق بسيط من الدرجة الأولى، التصرف الصح:", o: ["وضع ثلج مباشرة", "وضع مياه جارية فاترة", "دهن معجون أسنان"], c: 1 }
    ];

    let currentPool = [...masterBank];
    let score = 0;
    let counter = 1;

    function nextQuestion() {
        if (currentPool.length === 0) {
            alert("أنهيت الدفعة الحالية! سيتم إعادة تدوير الأسئلة.");
            currentPool = [...masterBank];
        }

        const idx = Math.floor(Math.random() * currentPool.length);
        const item = currentPool[idx];

        document.getElementById('q-count').innerText = `السؤال: ${counter}`;
        document.getElementById('question').innerText = item.q;
        
        const optsDiv = document.getElementById('options');
        optsDiv.innerHTML = '';
        
        item.o.forEach((txt, i) => {
            const btn = document.createElement('button');
            btn.className = 'btn-opt';
            btn.innerText = txt;
            btn.onclick = () => {
                if(i === item.c) {
                    score += 10; counter++;
                    document.getElementById('xp').innerText = `XP: ${score}`;
                    document.getElementById('fill').style.width = (counter % 20 * 5) + "%";
                    currentPool.splice(idx, 1); // منع التكرار
                    nextQuestion();
                } else {
                    alert("إجابة خاطئة، حاول مرة أخرى للتعلم!");
                }
            };
            optsDiv.appendChild(btn);
        });
    }

    nextQuestion();
</script>
</body>
</html>
